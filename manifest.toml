#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "wallos"
name = "Wallos"
description.en = "Personal Subscription Tracker"
description.fr = "Outil de suivi d'abonnement personnel"

version = "5.4.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "GPL-3.0"
demo = "https://demo.wallosapp.com"
code = "https://github.com/ellite/Wallos"

[integration]
yunohost = ">= 12.1.40"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "150M"
ram.build = "120M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/wallos"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/ellite/Wallos/archive/refs/tags/v5.4.1.tar.gz"
    sha256 = "8af7cd59a67df21428f2fae9e9a1456f1b0677c5ff8be5f6e6b0d157014348e1"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.5-curl, php8.5-gd, php8.5-imagick, php8.5-intl, php8.5-sqlite3, php8.5-zip, php8.5-xml"
